<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumina">
<meta name="mobile-web-app-capable" content="yes">
<title>Lumina — Energy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1117;
  --navy2:#111827;
  --navy3:#1a2235;
  --navy4:#1e2d45;
  --card:#162032;
  --card2:#1c2a40;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --violet:#6366f1;
  --violet2:#818cf8;
  --violet3:#4f46e5;
  --violet-dim:rgba(99,102,241,0.15);
  --violet-glow:rgba(99,102,241,0.25);
  --slate:#8b9ab4;
  --slate2:#b0bdcf;
  --white:#f0f4ff;
  --muted:#4a5c78;
  --red:#ef4444;
  --green:#34d399;
  --amber:#fbbf24;
  --text:#e8edf5;
  --radius:14px;
  --radius-sm:10px;
  --radius-xs:8px;
}
html,body{height:100%;margin:0;background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:100px;min-height:0}
.screen::-webkit-scrollbar{width:0}
.nav-bar-wrap{flex-shrink:0;padding:8px 24px calc(20px + env(safe-area-inset-bottom));background:transparent;position:relative;z-index:10;margin-top:-88px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.app{background:var(--navy)}

/* TOP HEADER */
.header{padding:52px 20px 12px;background:linear-gradient(to bottom,var(--navy) 60%,transparent)}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:26px;color:var(--white);letter-spacing:-0.3px}
.logo span{color:var(--violet2)}
.header-date{font-size:12px;color:var(--slate);font-weight:400;text-transform:uppercase;letter-spacing:0.06em}
.header-btn{background:var(--card);border:0.5px solid var(--border2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s}
.header-btn:hover{background:var(--card2)}
.header-btn svg{width:16px;height:16px;stroke:var(--slate2);stroke-width:1.8;fill:none}

/* WEEKLY CALENDAR */
.week-strip{padding:0 16px 8px;touch-action:pan-y;overflow:hidden}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:var(--radius-sm);cursor:pointer;border:0.5px solid var(--border);background:var(--card);min-height:68px;justify-content:center;transition:border-color 0.18s,background 0.18s}
.day-btn .day-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;line-height:1}
.day-btn .day-num{font-size:20px;font-weight:500;color:var(--muted);line-height:1.1}
.day-btn .day-dot{width:5px;height:5px;border-radius:50%;background:transparent;flex-shrink:0}
.day-btn.has-data .day-dot{background:var(--violet)}
.day-btn.has-data .day-num{color:var(--slate2)}
.day-btn.today .day-num{color:var(--white)}
.day-btn.today .day-label{color:var(--slate)}
.day-btn.selected{background:var(--card2);border-color:var(--violet)}
.day-btn.selected .day-label{color:var(--violet2)}
.day-btn.selected .day-num{color:var(--white)}
.day-btn.future{opacity:0.3;cursor:default;pointer-events:none}

/* SECTION LABEL */
.section-label{padding:20px 20px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);font-weight:600}

/* CARD */
.card{margin:0 16px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color 0.2s}
.card-title-outer{display:flex;align-items:center;gap:7px;padding:20px 20px 10px;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet2);font-weight:600}
.card-title-outer svg{width:14px;height:14px;stroke:var(--violet2);stroke-width:2;fill:none;flex-shrink:0}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet2);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.card-title svg{width:14px;height:14px;stroke:var(--violet2);stroke-width:2;fill:none}

/* FIELD GROUPS WITHIN A CARD */
.field-block{padding:4px 0 2px;margin-bottom:20px}
.field-block:last-child{margin-bottom:0}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.09em;color:var(--white);font-weight:600;margin-bottom:10px}
.field-divider{height:0.5px;background:var(--border);margin:16px 0}

/* ENERGY PICKER */
.energy-row{display:flex;gap:8px;justify-content:space-between}
.energy-btn{flex:1;aspect-ratio:1;border-radius:50%;border:1.5px solid var(--border2);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--slate);cursor:pointer;transition:all 0.18s;position:relative;max-width:56px}
.energy-btn:hover{border-color:var(--violet);color:var(--white)}
.energy-btn.filled{border-color:var(--violet);background:var(--violet-dim);color:var(--violet2)}
.energy-btn.selected{border-color:var(--violet);background:var(--violet);color:#fff}

/* TEXT INPUT */
.input-field{width:100%;background:var(--navy3);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:12px 14px;font-size:16px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color 0.18s}
.input-field::placeholder{color:var(--muted)}
.input-field:focus{border-color:var(--violet)}
.input-field.multiline{min-height:90px}

/* TAG INPUT */
.tag-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.tag-input-area{display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-height:50px;width:100%;background:var(--navy3);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:10px 14px;cursor:text;transition:border-color 0.18s}
.tag-input-area:focus-within{border-color:var(--violet)}
.tag{display:flex;align-items:center;gap:5px;background:var(--navy3);border:0.5px solid var(--border2);border-radius:20px;padding:5px 12px 5px 14px;font-size:13px;color:var(--slate2)}
.tag.positive{border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);color:#6ee7b7}
.tag.negative{border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.08);color:#fca5a5}
.tag-remove{cursor:pointer;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:0.6;transition:opacity 0.15s}
.tag-remove:hover{opacity:1}
.tag-remove svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none}
.tag-input-inline{background:none;border:none;outline:none;font-size:16px;color:var(--text);font-family:'DM Sans',sans-serif;min-width:80px;flex:1}
.tag-input-inline::placeholder{color:var(--muted)}

/* SUBMIT BUTTON */
.btn-primary{display:block;width:100%;padding:15px;background:var(--violet);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--radius);cursor:pointer;text-align:center;transition:all 0.18s;letter-spacing:0.01em}
.btn-primary:hover{background:var(--violet2)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary.secondary{background:var(--card);color:var(--slate2);border:0.5px solid var(--border2)}
.btn-primary.secondary:hover{background:var(--card2)}
.btn-row{display:flex;gap:10px;padding:0 16px;margin-bottom:12px}
.btn-row .btn-primary{flex:1}

/* STATUS BADGE */
.status-row{display:flex;gap:8px;padding:0 16px;margin-bottom:8px}
.status-badge{display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid}
.status-badge.done{color:#6ee7b7;border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.08)}
.status-badge.pending{color:var(--muted);border-color:var(--border);background:transparent}
.status-badge svg{width:10px;height:10px;fill:currentColor;stroke:none}


/* INSIGHTS SEGMENTED CONTROL */
.insight-sub-tabs{display:flex;padding:8px 16px 4px}
.insight-sub-tabs{background:transparent}
.segmented{display:flex;background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:3px;gap:0;flex:1}
.insight-sub-tab{flex:1;padding:7px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;background:transparent;color:var(--slate);cursor:pointer;transition:all 0.18s;border-radius:6px;text-align:center}
.insight-sub-tab.active{background:var(--violet);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* NAV BAR */
.nav-bar{display:flex;justify-content:space-around;background:rgba(28,42,64,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:6px 8px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 16px;border-radius:var(--radius-sm);transition:all 0.18s;background:transparent}
.nav-item svg{width:22px;height:22px;stroke:var(--muted);stroke-width:1.7;fill:none;transition:stroke 0.18s}
.nav-item .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500;transition:color 0.18s}
.nav-item.active svg{stroke:var(--violet2)}
.nav-item.active .nav-label{color:var(--violet2)}

/* INSIGHTS */
.insight-header{padding:52px 20px 16px}
.insight-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--white);margin-bottom:4px}
.insight-sub{font-size:13px;color:var(--slate)}
.insight-period-nav{display:flex;align-items:center;justify-content:space-between;padding:0 12px 14px}
.insight-period-label{font-size:13px;font-weight:500;color:var(--slate2)}
.nav-arrow-btn{background:var(--card);border:0.5px solid var(--border);padding:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);transition:background 0.15s}
.nav-arrow-btn:hover{background:var(--card2)}
.nav-arrow-btn svg{width:18px;height:18px;stroke:var(--slate2);stroke-width:2;fill:none}
.nav-arrow-btn:disabled{opacity:0.3;cursor:default}
.chart-stats{display:flex;align-items:center;margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)}
.chart-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-stat-val{font-size:15px;font-weight:600;color:var(--white)}
.chart-stat-val.positive{color:#6ee7b7}
.chart-stat-val.negative{color:#f87171}
.chart-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500}
.chart-stat-divider{width:0.5px;height:28px;background:var(--border);flex-shrink:0}
.chart-card{margin:0 16px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.chart-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet2);font-weight:600;margin-bottom:14px}
.diff-chart{display:grid;grid-template-columns:repeat(var(--diff-cols,7),1fr);gap:4px;position:relative;padding:8px 0 0}
.diff-zero-line{position:absolute;left:0;right:0;top:calc(8px + 52px + 24px);height:1px;background:var(--border2);pointer-events:none}
.diff-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.diff-bar-wrap{display:flex;flex-direction:column;align-items:center;height:128px;justify-content:center}
.diff-bar-pos{display:flex;flex-direction:column;justify-content:flex-end;height:52px;width:100%}
.diff-bar-neg{display:flex;flex-direction:column;justify-content:flex-start;height:52px;width:100%}
.diff-bar{width:70%;margin:0 auto;border-radius:3px;min-height:3px}
.diff-bar.neg{border-radius:0 0 3px 3px}
.diff-bar:not(.neg){border-radius:3px 3px 0 0}
.diff-val{font-size:11px;font-weight:600;line-height:1;height:24px;display:flex;align-items:center;color:var(--slate)}
.bar-day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em}
.bar-day-today{color:var(--slate2);font-weight:600}

.freq-list{display:flex;flex-direction:column;gap:8px}
.corr-list{display:flex;flex-direction:column;gap:14px}
.corr-item{}
.corr-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.corr-name{font-size:14px;color:var(--text);font-weight:500}
.corr-score{font-size:13px;font-weight:600}
.corr-score.positive{color:#6ee7b7}
.corr-score.negative{color:#f87171}
.corr-bar-bg{height:5px;background:var(--navy3);border-radius:3px;overflow:hidden;margin-bottom:4px}
.corr-bar-fill{height:100%;border-radius:3px}
.corr-bar-fill.positive{background:var(--green)}
.corr-bar-fill.negative{background:#f87171}
.corr-meta{font-size:11px;color:var(--muted)}
.corr-note{font-size:11px;color:var(--muted);padding:4px 20px 16px;line-height:1.5;font-style:italic}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 32px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:var(--muted);stroke-width:1.2;fill:none;margin-bottom:16px;opacity:0.5}
.empty-state p{font-size:14px;line-height:1.6}

/* EXPORT/IMPORT */
.settings-section{padding:0 16px 10px}
.settings-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:background 0.15s;color:var(--slate2);font-size:14px;font-family:'DM Sans',sans-serif}
.settings-btn:hover{background:var(--card2)}
.settings-btn svg{width:18px;height:18px;stroke:var(--violet2);stroke-width:1.8;fill:none;flex-shrink:0}
.settings-label{font-size:12px;color:var(--muted);padding:12px 16px 6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:500}

/* DIVIDER */
.divider{height:0.5px;background:var(--border);margin:8px 16px}

/* TOAST */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;color:var(--white);z-index:200;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* READ-ONLY VIEW */
.save-btn{display:flex;align-items:center;gap:6px;background:var(--violet);border:none;border-radius:var(--radius-xs);padding:10px 20px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;width:calc(100% - 32px);margin:8px 16px 4px;justify-content:center}
.save-btn:hover{background:var(--violet2)}
.save-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.save-btn.saved{background:#059669;pointer-events:none}
.ro-edit-row{display:flex;justify-content:flex-end;padding:8px 16px 4px}
.ro-edit-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:7px 14px;font-size:12px;font-weight:500;color:var(--slate2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;text-transform:uppercase;letter-spacing:0.06em}
.ro-edit-btn:hover{background:var(--card2)}
.ro-edit-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.ro-edit-btn.done{color:var(--violet2);border-color:var(--violet)}
.ro-dots{display:flex;gap:6px;align-items:center;padding:2px 0}
.ro-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--card2)}
.ro-dot.on{border-color:var(--violet);background:var(--violet-dim)}
.ro-dot.top{background:var(--violet);border-color:var(--violet)}
.ro-text{font-size:15px;color:var(--slate2);line-height:1.6}
.ro-empty{font-size:13px;color:var(--muted);padding:4px 0 8px;font-style:italic}


.entry-view-card{margin:0 16px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px}
.entry-view-card .ev-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)}
.entry-view-card .ev-row:last-child{border-bottom:none}
.entry-view-card .ev-label{font-size:12px;color:var(--slate);text-transform:uppercase;letter-spacing:0.06em}
.entry-view-card .ev-val{font-size:14px;color:var(--text);text-align:right;max-width:60%}
.energy-display{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:600;border:1.5px solid var(--border2)}
</style>
</head>
<body>
<div class="app">

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SINGLE SCREEN -->
<div class="screen" id="screen-main">
  <div class="header">
    <div class="header-inner">
      <div><div class="logo">Lumina<span>.</span></div><div class="header-date" id="header-date-label"></div></div>
      <div style="display:flex;gap:8px">
        <button class="header-btn" onclick="showExportImport()" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- DAILY VIEW -->
  <div id="view-daily">
    <div class="week-strip">
      <div class="week-row" id="week-row"></div>
    </div>
    <div id="daily-content"></div>
  </div>

  <!-- INSIGHTS VIEW -->
  <div id="view-insights" style="display:none">
    <div class="insight-sub-tabs">
      <div class="segmented">
        <div class="insight-sub-tab active" id="itab-week" onclick="setInsightRange('week')">Week</div>
        <div class="insight-sub-tab" id="itab-month" onclick="setInsightRange('month')">Month</div>
      </div>
    </div>
    <div class="insight-period-nav">
      <button class="nav-arrow-btn" onclick="shiftInsight(-1)">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="insight-period-label" id="insight-period-label"></span>
      <button class="nav-arrow-btn" id="insight-next-btn" onclick="shiftInsight(1)">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="insights-content"></div>
  </div>
</div>

<!-- NAV BAR -->
<div class="nav-bar-wrap">
  <div class="nav-bar">
    <div class="nav-item active" id="nav-daily" onclick="switchView('daily')">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="nav-label">Today</span>
    </div>
    <div class="nav-item" id="nav-insights" onclick="switchView('insights')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-label">Insights</span>
    </div>
  </div>
</div>
</div>

<!-- EXPORT/IMPORT MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;backdrop-filter:blur(4px)" onclick="hideModal()"></div>
<div id="modal-sheet" style="display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy2);border-top:0.5px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 0 40px;z-index:151">
  <div style="width:36px;height:4px;background:var(--muted);border-radius:2px;margin:0 auto 20px"></div>
  <div style="padding:0 20px 16px;font-family:'DM Serif Display',serif;font-size:20px;color:var(--white)">Data & Settings</div>
  <div class="settings-section">
    <div class="settings-label">Export / Import</div>
    <button class="settings-btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export all entries as CSV
    </button>
    <button class="settings-btn" onclick="document.getElementById('import-input').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import from CSV
    </button>
    <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(this)">
  </div>
  <div class="settings-section">
    <div class="settings-label">Danger zone</div>
    <button class="settings-btn" id="clear-btn" onclick="clearAllData()" style="color:#fca5a5">
      <svg viewBox="0 0 24 24" style="stroke:#fca5a5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear all data
    </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'lumina_entries_v2';
let entries = {};
let selectedDate = todayStr();
let insightRange = 'week';
let weekOffset = 0; // 0 = current week, -1 = last week, etc.

function localStr(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`}
function todayStr(){return localStr(new Date())}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmtShort(s){const d=parseDate(s);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fmtDay(s){const d=parseDate(s);const i=d.getDay();return['Su','Mo','Tu','We','Th','Fr','Sa'][i]}
function fmtDayNum(s){return parseInt(s.slice(8,10),10)}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return localStr(d)}

// Return Monday of the ISO week containing date string s, offset by weekOffset weeks
function getMondayOfWeek(s, offset){
  const d=parseDate(s);
  const dow=d.getDay(); // 0=Sun
  const diffToMon=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diffToMon+(offset*7));
  return localStr(d);
}

function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)entries=JSON.parse(raw);}catch(e){entries={}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(entries))}
function getEntry(d){return entries[d]||(entries[d]={morningEnergy:0,intention:'',eveningEnergy:0,givers:[],drainers:[],reflection:''})}
function hasData(d){const e=entries[d];if(!e)return false;return e.morningEnergy>0||e.eveningEnergy>0||e.givers.length>0||e.drainers.length>0}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

function shiftWeek(dir,animDir){
  const next=weekOffset+dir;
  if(next>0)return;
  weekOffset=next;
  const mon=getMondayOfWeek(todayStr(),weekOffset);
  const sun=addDays(mon,6);
  const today=todayStr();
  if(selectedDate<mon||selectedDate>sun){
    selectedDate=today>=mon&&today<=sun?today:sun;
  }
  const ad=animDir!==undefined?animDir:dir;
  animateWeekRow(ad,()=>{buildWeekStrip();});
  buildDailyContent();
}

// --- WEEK STRIP ---
function buildWeekStrip(){
  const row=document.getElementById('week-row');
  const today=todayStr();
  const mon=getMondayOfWeek(today,weekOffset);

  // Disable next button when on current week

  row.innerHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(mon,i);
    const isToday=d===today;
    const isFuture=d>today;
    const isSel=d===selectedDate;
    const has=hasData(d);
    const btn=document.createElement('div');
    let cls='day-btn';
    if(isToday)cls+=' today';
    if(isSel)cls+=' selected';
    if(has)cls+=' has-data';
    if(isFuture)cls+=' future';
    btn.className=cls;
    btn.innerHTML=`<span class="day-label">${fmtDay(d)}</span><span class="day-num">${fmtDayNum(d)}</span><span class="day-dot"></span>`;
    if(!isFuture){
      btn.onclick=()=>{selectedDate=d;editingDate=null;buildWeekStrip();buildDailyContent();};
    }
    row.appendChild(btn);
  }
}

// Swipe to navigate weeks — live drag + snap
(function initSwipe(){
  const strip=document.querySelector('.week-strip');
  const getRow=()=>document.getElementById('week-row');
  let startX=0,startY=0,curX=0,locked=false,axisLocked=false;

  strip.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    curX=0;locked=false;axisLocked=false;
    const row=getRow();
    row.style.transition='none';
  },{passive:true});

  strip.addEventListener('touchmove',e=>{
    if(locked)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(!axisLocked){
      if(Math.abs(dy)>Math.abs(dx)){locked=true;return;}
      if(Math.abs(dx)>6)axisLocked=true;
    }
    if(!axisLocked)return;
    curX=dx;
    // clamp: can't drag left if already on current week
    if(curX<0&&weekOffset>=0)curX=0;
    const row=getRow();
    row.style.transform=`translateX(${curX}px)`;
    row.style.opacity=String(1-Math.min(Math.abs(curX)/160,0.5));
  },{passive:true});

  strip.addEventListener('touchend',e=>{
    if(locked){locked=false;return;}
    const W=strip.offsetWidth||300;
    const threshold=W*0.25;
    if(Math.abs(curX)>threshold){
      const goBack=curX>0;
      if(!goBack&&weekOffset>=0){snapBack();return;}
      const dir=goBack?-1:1;
      const animDir=goBack?1:-1;
      // animate out
      const row=getRow();
      const outX=goBack?W:-W;
      row.style.transition='transform 0.18s ease,opacity 0.18s ease';
      row.style.transform=`translateX(${outX}px)`;
      row.style.opacity='0';
      setTimeout(()=>{
        weekOffset+=dir;
        const mon=getMondayOfWeek(todayStr(),weekOffset);
        const sun=addDays(mon,6);
        const today=todayStr();
        if(selectedDate<mon||selectedDate>sun)
          selectedDate=today>=mon&&today<=sun?today:sun;
        buildWeekStrip();
        buildDailyContent();
        const r=getRow();
        r.style.transition='none';
        r.style.transform=`translateX(${goBack?-W:W}px)`;
        r.style.opacity='0';
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          r.style.transition='transform 0.22s ease,opacity 0.22s ease';
          r.style.transform='translateX(0)';
          r.style.opacity='1';
        }));
      },180);
    } else {
      snapBack();
    }
    curX=0;axisLocked=false;
  },{passive:true});

  function snapBack(){
    const row=getRow();
    row.style.transition='transform 0.2s ease,opacity 0.2s ease';
    row.style.transform='translateX(0)';
    row.style.opacity='1';
  }
})();

function animateWeekRow(dir,cb){
  const row=document.getElementById('week-row');
  const W=document.querySelector('.week-strip').offsetWidth||300;
  const outX=dir>0?-W:W;
  const inX=dir>0?W:-W;
  row.style.transition='transform 0.18s ease,opacity 0.18s ease';
  row.style.transform=`translateX(${outX}px)`;
  row.style.opacity='0';
  setTimeout(()=>{
    cb();
    const r=document.getElementById('week-row');
    r.style.transition='none';
    r.style.transform=`translateX(${inX}px)`;
    r.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      r.style.transition='transform 0.22s ease,opacity 0.22s ease';
      r.style.transform='translateX(0)';
      r.style.opacity='1';
    }));
  },180);
}

// --- DAILY CONTENT ---
let editingDate = null;
let savedDates = new Set(JSON.parse(localStorage.getItem('lumina_saved')||'[]'));

function saveSavedDates(){localStorage.setItem('lumina_saved',JSON.stringify([...savedDates]));}

function saveEntry(){
  savedDates.add(selectedDate);
  saveSavedDates();
  editingDate=null;
  const btn=document.getElementById('save-btn');
  if(btn){
    btn.classList.add('saved');
    btn.innerHTML=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
    btn.style.pointerEvents='none';
    setTimeout(()=>{buildDailyContent();},1200);
  } else {
    buildDailyContent();
  }
}

function buildDailyContent(){
  const container=document.getElementById('daily-content');
  const today=todayStr();
  const isFuture=selectedDate>today;
  const isToday=selectedDate===today;
  const entry=getEntry(selectedDate);
  const dateLabel=document.getElementById('header-date-label');
  dateLabel.textContent=isToday?'Today':fmtShort(selectedDate);

  if(isFuture){
    container.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>No entry yet for this date.<br>Check back later!</p></div>`;
    return;
  }

  const isSaved = savedDates.has(selectedDate);
  const isEditing = editingDate===selectedDate || (isToday && !isSaved);
  const hasAnyData = hasData(selectedDate);

  // Read-only: saved, or past day with data not actively being edited
  if(isSaved && !isEditing){
    buildReadOnlyContent(container, entry, isToday);
    return;
  }
  if(!isToday && hasAnyData && editingDate!==selectedDate){
    buildReadOnlyContent(container, entry, isToday);
    return;
  }

  buildEditContent(container, entry, isToday);
}

function buildReadOnlyContent(container, entry, isToday){
  const energyDots=(val)=>[1,2,3,4,5].map(n=>`<div class="ro-dot ${n<=val?'on':''} ${n===val?'top':''}"></div>`).join('');

  let html=``;

  html+=`<div class="card-title-outer"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg> Morning check-in</div>
  <div class="card">`;

  if(entry.morningEnergy>0){
    html+=`<div class="field-block"><div class="field-label">Energy level</div><div class="ro-dots">${energyDots(entry.morningEnergy)}</div></div>`;
  }
  if(entry.intention){
    html+=`<div class="field-block"><div class="field-label">Intention</div><div class="ro-text">${escHtml(entry.intention)}</div></div>`;
  }
  if(!entry.morningEnergy&&!entry.intention){
    html+=`<div class="ro-empty">Nothing logged</div>`;
  }
  html+=`</div>`;

  html+=`<div class="card-title-outer"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Evening reflection</div>
  <div class="card">`;

  if(entry.eveningEnergy>0){
    html+=`<div class="field-block"><div class="field-label">Energy level</div><div class="ro-dots">${energyDots(entry.eveningEnergy)}</div></div>`;
  }
  if(entry.givers.length>0){
    html+=`<div class="field-block"><div class="field-label" style="color:#6ee7b7">Energy givers</div><div class="tag-list">${entry.givers.map(t=>`<div class="tag positive">${escHtml(t)}</div>`).join('')}</div></div>`;
  }
  if(entry.drainers.length>0){
    html+=`<div class="field-block"><div class="field-label" style="color:#fca5a5">Energy drainers</div><div class="tag-list">${entry.drainers.map(t=>`<div class="tag negative">${escHtml(t)}</div>`).join('')}</div></div>`;
  }
  if(entry.reflection){
    html+=`<div class="field-block"><div class="field-label">Reflection</div><div class="ro-text">${escHtml(entry.reflection)}</div></div>`;
  }
  if(!entry.eveningEnergy&&!entry.givers.length&&!entry.drainers.length&&!entry.reflection){
    html+=`<div class="ro-empty">Nothing logged</div>`;
  }
  html+=`</div><button class="save-btn" style="background:var(--card);border:0.5px solid var(--border2);color:var(--slate2);" onclick="startEditing()"><svg viewBox="0 0 24 24" style="stroke:var(--slate2)"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
  <div style="height:8px"></div>`;

  container.innerHTML=html;
}

function buildEditContent(container, entry, isToday){
  let html=``;

  html+=`<div class="card-title-outer"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg> Morning check-in</div>
  <div class="card">
    <div class="field-block">
      <div class="field-label">Energy level</div>
      <div class="energy-row">${[1,2,3,4,5].map(n=>`<button class="energy-btn e${n} ${n<=entry.morningEnergy?'filled':''} ${n===entry.morningEnergy?'selected':''}" onclick="setMorning(${n})">${n}</button>`).join('')}</div>
    </div>
    <div class="field-block">
      <div class="field-label">Today's intention</div>
      <input type="text" class="input-field" placeholder="What do you want to focus on today?" id="intention-field" onchange="setField('intention',this.value)" value="${escHtml(entry.intention)}">
    </div>
  </div>`;

  html+=`<div class="card-title-outer"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Evening reflection</div>
  <div class="card">
    <div class="field-block">
      <div class="field-label">Energy level</div>
      <div class="energy-row">${[1,2,3,4,5].map(n=>`<button class="energy-btn e${n} ${n<=entry.eveningEnergy?'filled':''} ${n===entry.eveningEnergy?'selected':''}" onclick="setEvening(${n})">${n}</button>`).join('')}</div>
    </div>
    <div class="field-block">
      <div class="field-label" style="color:#6ee7b7">Energy givers</div>
      ${entry.givers.length>0?`<div class="tag-list">${entry.givers.map(t=>`<div class="tag positive">${escHtml(t)}<span class="tag-remove" onclick="removeTag('givers','${escHtml(t)}',event)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></div>`).join('')}</div>`:''}
      <input class="input-field" id="givers-input" placeholder="Add, press Enter…" onkeydown="handleTagKey(event,'givers')">
    </div>
    <div class="field-block">
      <div class="field-label" style="color:#fca5a5">Energy drainers</div>
      ${entry.drainers.length>0?`<div class="tag-list">${entry.drainers.map(t=>`<div class="tag negative">${escHtml(t)}<span class="tag-remove" onclick="removeTag('drainers','${escHtml(t)}',event)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></div>`).join('')}</div>`:''}
      <input class="input-field" id="drainers-input" placeholder="Add, press Enter…" onkeydown="handleTagKey(event,'drainers')">
    </div>
    <div class="field-block">
      <div class="field-label">Reflection</div>
      <textarea class="input-field multiline" placeholder="How did the day go? Any patterns you notice?" id="reflection-field" onchange="setField('reflection',this.value)">${escHtml(entry.reflection)}</textarea>
    </div>
  </div>`;

  if(isToday){
    html+=`<button class="save-btn" id="save-btn" onclick="saveEntry()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save check-in</button>`;
  } else if(editingDate===selectedDate){
    html+=`<button class="save-btn" id="save-btn" onclick="saveEntry()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save check-in</button>`;
  }

  html+=`<div style="height:8px"></div>`;
  container.innerHTML=html;
}

function startEditing(){editingDate=selectedDate;buildDailyContent();}
function stopEditing(){editingDate=null;buildDailyContent();}


function statusDot(done){return done?`<svg style="width:8px;height:8px;fill:#6ee7b7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>`:`<svg style="width:8px;height:8px;fill:var(--muted)" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>`}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setMorning(n){const e=getEntry(selectedDate);e.morningEnergy=e.morningEnergy===n?0:n;save();buildDailyContent();buildWeekStrip();}
function setEvening(n){const e=getEntry(selectedDate);e.eveningEnergy=e.eveningEnergy===n?0:n;save();buildDailyContent();buildWeekStrip();}
function setField(field,val){const e=getEntry(selectedDate);e[field]=val;save();}

function handleTagKey(ev,field){
  if(ev.key==='Enter'||ev.key===','){
    ev.preventDefault();
    const val=ev.target.value.trim().replace(/,$/,'').trim();
    if(val){addTag(field,val);ev.target.value='';}
  }
}
function addTag(field,val){
  const e=getEntry(selectedDate);
  if(!e[field].includes(val)){e[field].push(val);save();buildDailyContent();}
  setTimeout(()=>{const el=document.getElementById(field==='givers'?'givers-input':'drainers-input');if(el)el.focus();},0);
}
function removeTag(field,val,ev){
  ev.stopPropagation();
  const inputId=field==='givers'?'givers-input':'drainers-input';
  const e=getEntry(selectedDate);
  e[field]=e[field].filter(t=>t!==val);
  save();buildDailyContent();
  setTimeout(()=>{const el=document.getElementById(inputId);if(el)el.focus();},0);
}

// --- INSIGHTS ---
let insightOffset=0;

function setInsightRange(r){
  insightRange=r;
  insightOffset=0;
  document.getElementById('itab-week').classList.toggle('active',r==='week');
  document.getElementById('itab-month').classList.toggle('active',r==='month');
  buildInsights();
}

function shiftInsight(dir){
  insightOffset+=dir;
  if(insightOffset>0)insightOffset=0;
  buildInsights();
}

function getInsightDateRange(){
  const today=todayStr();
  if(insightRange==='week'){
    const mon=getMondayOfWeek(today,insightOffset);
    const sun=addDays(mon,6);
    const range=[];
    for(let i=0;i<7;i++)range.push(addDays(mon,i));
    return{range,start:mon,end:sun};
  } else {
    // calendar month offset
    const d=new Date();
    d.setDate(1);
    d.setMonth(d.getMonth()+insightOffset);
    const year=d.getFullYear(),month=d.getMonth();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const range=[];
    for(let i=1;i<=daysInMonth;i++){
      const s=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      range.push(s);
    }
    return{range,start:range[0],end:range[range.length-1]};
  }
}

function fmtPeriodLabel(start,end){
  const s=parseDate(start),e=parseDate(end);
  const mo=s.toLocaleDateString('en-US',{month:'short'});
  const mo2=e.toLocaleDateString('en-US',{month:'short'});
  if(insightRange==='week'){
    return s.getMonth()===e.getMonth()
      ?`${mo} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`
      :`${mo} ${s.getDate()} – ${mo2} ${e.getDate()}, ${e.getFullYear()}`;
  } else {
    return s.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  }
}

function buildInsights(){
  const today=todayStr();
  const{range:dateRange,start,end}=getInsightDateRange();

  // Update period label and next button
  document.getElementById('insight-period-label').textContent=fmtPeriodLabel(start,end);
  document.getElementById('insight-next-btn').disabled=insightOffset>=0;

  const entriesInRange=dateRange.map(d=>({date:d,...(entries[d]||{})}));
  const withMorning=entriesInRange.filter(e=>e.morningEnergy>0);
  const withEvening=entriesInRange.filter(e=>e.eveningEnergy>0);
  const withBoth=entriesInRange.filter(e=>e.morningEnergy>0&&e.eveningEnergy>0);

  const avgMorning=withMorning.length?avg(withMorning.map(e=>e.morningEnergy)):null;
  const avgEvening=withEvening.length?avg(withEvening.map(e=>e.eveningEnergy)):null;
  const avgDiff=withBoth.length?avg(withBoth.map(e=>e.eveningEnergy-e.morningEnergy)):null;


  const c=document.getElementById('insights-content');

  if(withMorning.length===0&&withEvening.length===0){
    c.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><p>No entries yet in this period.<br>Start tracking today to see insights!</p></div>`;
    return;
  }

  let html=``;

  // Diff chart + stats below
  const chartDays=dateRange;
  const maxAbs=4;
  const barH=52;
  html+=`<div class="chart-card"><div class="chart-title">Daily energy shift</div>
  <div class="diff-chart" style="--diff-cols:${chartDays.length}">
    <div class="diff-zero-line"></div>`;
  chartDays.forEach(d=>{
    const e=entries[d]||{};
    const hasBoth=e.morningEnergy>0&&e.eveningEnergy>0;
    const diff=hasBoth?e.eveningEnergy-e.morningEnergy:null;
    const lbl=fmtDay(d);
    const isToday=d===todayStr();
    if(diff!==null){
      const pct=Math.min(Math.abs(diff)/maxAbs,1);
      const h=Math.round(pct*barH);
      const pos=diff>=0;
      html+=`<div class="diff-col">
        <div class="diff-bar-wrap">
          <div class="diff-bar-pos">${pos?`<div class="diff-bar" style="height:${h}px;background:var(--violet)"></div>`:''}</div>
          <div class="diff-val" style="color:${pos?'var(--violet2)':'#f87171'};${Math.abs(diff)===0?'opacity:0.4':''}">${diff>0?'+':''}${diff}</div>
          <div class="diff-bar-neg">${!pos?`<div class="diff-bar neg" style="height:${h}px;background:#f87171"></div>`:''}</div>
        </div>
        <span class="bar-day${isToday?' bar-day-today':''}">${lbl}</span>
      </div>`;
    } else {
      html+=`<div class="diff-col">
        <div class="diff-bar-wrap"><div class="diff-bar-pos"></div><div class="diff-val" style="opacity:0.2">—</div><div class="diff-bar-neg"></div></div>
        <span class="bar-day${isToday?' bar-day-today':''}">${lbl}</span>
      </div>`;
    }
  });
  html+=`</div>
  <div class="chart-stats">
    <div class="chart-stat"><span class="chart-stat-val">${avgMorning!==null?avgMorning.toFixed(1):'—'}</span><span class="chart-stat-label">Avg morning</span></div>
    <div class="chart-stat-divider"></div>
    <div class="chart-stat"><span class="chart-stat-val">${avgEvening!==null?avgEvening.toFixed(1):'—'}</span><span class="chart-stat-label">Avg evening</span></div>
    <div class="chart-stat-divider"></div>
    <div class="chart-stat"><span class="chart-stat-val ${avgDiff!==null?(avgDiff>=0?'positive':'negative'):''}">${avgDiff!==null?(avgDiff>=0?'+':'')+avgDiff.toFixed(1):'—'}</span><span class="chart-stat-label">Avg shift</span></div>
    <div class="chart-stat-divider"></div>
    <div class="chart-stat"><span class="chart-stat-val">${withBoth.length}</span><span class="chart-stat-label">Entries</span></div>
  </div>
  </div>`;

  // --- Delta correlation ---
  // Use ALL stored entries with both readings as the pool
  const allWithBoth=Object.entries(entries)
    .map(([d,e])=>({date:d,...e}))
    .filter(e=>e.morningEnergy>0&&e.eveningEnergy>0);

  // Collect all unique activities across all entries
  const allActivities=new Set();
  allWithBoth.forEach(e=>{
    (e.givers||[]).forEach(g=>allActivities.add('g:'+g));
    (e.drainers||[]).forEach(d=>allActivities.add('d:'+d));
  });

  // For each activity compute: avg delta on days WITH it vs WITHOUT it
  const correlations=[];
  allActivities.forEach(key=>{
    const[type,name]=key.split(/:(.+)/);
    const withAct=allWithBoth.filter(e=>
      type==='g'?(e.givers||[]).includes(name):(e.drainers||[]).includes(name)
    );
    const withoutAct=allWithBoth.filter(e=>
      type==='g'?!(e.givers||[]).includes(name):!(e.drainers||[]).includes(name)
    );
    if(withAct.length<1)return;
    const avgWith=avg(withAct.map(e=>e.eveningEnergy-e.morningEnergy));
    const avgWithout=withoutAct.length?avg(withoutAct.map(e=>e.eveningEnergy-e.morningEnergy)):0;
    const impact=avgWith-avgWithout;
    correlations.push({name,type,impact,n:withAct.length,avgWith});
  });

  // Split into boosters (positive impact) and drains (negative impact), sort by magnitude
  const boosters=correlations.filter(c=>c.impact>0).sort((a,b)=>b.impact-a.impact).slice(0,6);
  const drains=correlations.filter(c=>c.impact<0).sort((a,b)=>a.impact-b.impact).slice(0,6);

  if(boosters.length>0||drains.length>0){
    const maxImpact=Math.max(...correlations.map(c=>Math.abs(c.impact)),0.1);

    const renderRow=(c,positive)=>{
      const pct=Math.round((Math.abs(c.impact)/maxImpact)*100);
      const sign=c.impact>0?'+':'';
      const nLabel=c.n===1?'1 day':`${c.n} days`;
      return`<div class="corr-item">
        <div class="corr-top">
          <span class="corr-name">${escHtml(c.name)}</span>
          <span class="corr-score ${positive?'positive':'negative'}">${sign}${c.impact.toFixed(2)}</span>
        </div>
        <div class="corr-bar-bg"><div class="corr-bar-fill ${positive?'positive':'negative'}" style="width:${pct}%"></div></div>
        <div class="corr-meta">${nLabel} · avg shift ${c.avgWith>=0?'+':''}${c.avgWith.toFixed(1)} when present</div>
      </div>`;
    };

    if(boosters.length>0){
      html+=`<div class="section-label">Energy boosters</div><div class="card" style="padding:16px 20px"><div class="corr-list">`;
      boosters.forEach(c=>{html+=renderRow(c,true);});
      html+=`</div></div>`;
    }
    if(drains.length>0){
      html+=`<div class="section-label">Energy drains</div><div class="card" style="padding:16px 20px"><div class="corr-list">`;
      drains.forEach(c=>{html+=renderRow(c,false);});
      html+=`</div></div>`;
    }

    html+=`<div class="corr-note">Impact = avg energy shift on days with this activity minus days without it. Needs multiple entries to be meaningful.</div>`;
  }

  html+=`<div style="height:8px"></div>`;
  c.innerHTML=html;
}

function avg(arr){return arr.reduce((a,b)=>a+b,0)/arr.length}

// --- CSV EXPORT ---
function exportCSV(){
  const rows=[['date','morning_energy','intention','evening_energy','givers','drainers','reflection']];
  Object.entries(entries).sort().forEach(([d,e])=>{
    rows.push([d,e.morningEnergy||'',`"${(e.intention||'').replace(/"/g,'""')}"`,e.eveningEnergy||'',`"${(e.givers||[]).join(';').replace(/"/g,'""')}"`,`"${(e.drainers||[]).join(';').replace(/"/g,'""')}"`,`"${(e.reflection||'').replace(/"/g,'""')}"`]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`lumina-energy-${todayStr()}.csv`;a.click();
  URL.revokeObjectURL(url);
  hideModal();showToast('Exported successfully');
}

// --- CSV IMPORT ---
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){showToast('No data found');return;}
    // Parse headers — normalise to lowercase and trim
    const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim());
    const col=name=>headers.indexOf(name); // returns -1 if not present
    let count=0;
    lines.slice(1).forEach(line=>{
      const cols=parseCSVLine(line);
      if(cols.length<2)return;
      // date column: try 'date' header first, fall back to column 0
      const dateIdx=col('date')>=0?col('date'):0;
      const date=(cols[dateIdx]||'').trim();
      if(!/^\d{4}-\d{2}-\d{2}$/.test(date))return;
      const get=(name,fallbackIdx)=>{
        const i=col(name);
        return i>=0?(cols[i]||''):(cols[fallbackIdx]||'');
      };
      entries[date]={
        morningEnergy:parseInt(get('start of day energy',1))||0,
        intention:'',
        eveningEnergy:parseInt(get('end of day energy',2))||0,
        givers:get('energy givers',3).split(',').map(s=>s.trim()).filter(Boolean),
        drainers:get('energy drainers',4).split(',').map(s=>s.trim()).filter(Boolean),
        reflection:''
      };
      count++;
    });
    save();buildWeekStrip();buildDailyContent();hideModal();
    showToast(`Imported ${count} entries`);
  };
  reader.readAsText(file);
  input.value='';
}

function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'&&!inQ){inQ=true;}
    else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}

}
