<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lumina">
<title>Lumina — Energy Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D172A;
  --card:#101D36;
  --card2:#162545;
  --navy2:#0D172A;
  --navy3:#162040;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --violet:#6366f1;
  --violet2:#818cf8;
  --violet-dim:rgba(99,102,241,0.15);
  --slate:#8b9ab4;
  --slate2:#b0bdcf;
  --white:#f0f4ff;
  --text:#e8edf5;
  --muted:#4a5c78;
  --green:#34d399;
  --radius:14px;
  --radius-sm:10px;
  --radius-xs:8px;
}
html{height:-webkit-fill-available}
html,body{min-height:100%;min-height:-webkit-fill-available;margin:0;background:var(--navy);color:var(--text);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:-webkit-fill-available;max-width:430px;margin:0 auto;background:var(--navy)}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;min-height:0}
.screen::-webkit-scrollbar{width:0}

.header{padding:28px 16px 20px}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:36px;color:var(--white);letter-spacing:-0.5px}
.logo span{color:var(--violet2)}
.header-btn{background:var(--card);border:0.5px solid var(--border2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s}
.header-btn svg{width:16px;height:16px;stroke:var(--slate2);stroke-width:1.8;fill:none}

.week-nav-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px 6px}
.week-nav-date{font-size:12px;color:var(--slate);font-weight:500;text-transform:uppercase;letter-spacing:0.07em}
.week-nav-arrows{display:flex;gap:4px}
.week-nav-arrow{background:none;border:none;padding:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px}
.week-nav-arrow svg{width:16px;height:16px;stroke:var(--slate2);stroke-width:2;fill:none}
.week-nav-arrow:disabled svg{stroke:var(--muted);opacity:0.4}

.week-strip{padding:0 16px 20px;touch-action:pan-y;overflow:hidden}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 2px;border-radius:var(--radius-sm);cursor:pointer;background:transparent;justify-content:center;transition:all 0.18s}
.day-btn .day-label{font-size:9px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:600;line-height:1}
.day-btn .day-num{font-size:17px;font-weight:500;color:var(--muted);line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all 0.18s}
.day-btn .day-dot{width:4px;height:4px;border-radius:50%;background:transparent;flex-shrink:0}
.day-btn.has-data .day-dot{background:var(--violet)}
.day-btn.has-data .day-num{color:var(--slate2)}
.day-btn.today .day-num{color:var(--white)}
.day-btn.today .day-label{color:var(--slate)}
.day-btn.selected .day-num{background:var(--violet);color:#fff}
.day-btn.future{opacity:0.3;cursor:default;pointer-events:none}

.card{margin:0 16px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.card-header{display:flex;align-items:center;gap:12px;padding:2px 0 16px}
.card-header-icon{width:36px;height:36px;border-radius:10px;background:var(--violet-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-header-icon svg{width:18px;height:18px;stroke:var(--violet2);stroke-width:1.8;fill:none}
.card-header-text{display:flex;flex-direction:column;gap:1px}
.card-header-sub{font-size:11px;text-transform:uppercase;letter-spacing:0.09em;color:var(--violet2);font-weight:600}
.card-header-title{font-size:16px;font-weight:500;color:var(--white)}

.field-block{padding:4px 0 2px;margin-bottom:20px}
.field-block:last-child{margin-bottom:0}
.field-label{font-size:12px;color:var(--slate2);font-weight:600;margin-bottom:10px}

.energy-row{display:flex;gap:8px;justify-content:space-between}
.energy-btn{flex:1;aspect-ratio:1;border-radius:50%;border:1.5px solid var(--border2);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--slate);cursor:pointer;transition:all 0.18s;max-width:56px}
.energy-btn:hover{border-color:var(--violet);color:var(--white)}
.energy-btn.filled{border-color:var(--violet);background:var(--violet-dim);color:var(--violet2)}
.energy-btn.selected{border-color:var(--violet);background:var(--violet);color:#fff}

.input-field{width:100%;background:var(--navy3);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:12px 14px;font-size:16px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color 0.18s}
.input-field::placeholder{color:var(--muted)}
.input-field:focus{border-color:var(--violet)}
.input-field.multiline{min-height:90px}

.tag-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.tag{display:flex;align-items:center;gap:5px;background:var(--navy3);border:0.5px solid var(--border2);border-radius:20px;padding:5px 12px 5px 14px;font-size:13px;color:var(--slate2)}
.tag.positive{border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.08);color:#6ee7b7}
.tag.negative{border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.08);color:#fca5a5}
.tag-remove{cursor:pointer;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:0.6}
.tag-remove svg{width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none}

.save-btn{display:flex;align-items:center;gap:6px;background:var(--violet);border:none;border-radius:var(--radius-xs);padding:16px 20px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;width:calc(100% - 32px);margin:8px 16px 4px;justify-content:center}
.save-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.save-btn.saved{background:#059669;pointer-events:none}

.ro-energy-num{font-size:22px;font-weight:600;color:var(--white)}
.ro-text{font-size:15px;color:var(--slate2);line-height:1.6}
.ro-empty{font-size:13px;color:var(--muted);padding:4px 0 8px;font-style:italic}

.nav-bar-wrap{flex-shrink:0;padding:0 20px calc(20px + env(safe-area-inset-bottom));background:transparent;margin-top:-72px;position:relative;z-index:10;pointer-events:none}
.nav-bar{display:flex;justify-content:space-around;background:rgba(16,29,54,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid var(--border2);border-radius:28px;padding:8px 8px;pointer-events:auto;box-shadow:0 8px 32px rgba(0,0,0,0.35)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 20px;border-radius:20px;transition:all 0.2s;background:transparent}
.nav-item svg{width:22px;height:22px;stroke:var(--muted);stroke-width:1.7;fill:none;transition:stroke 0.18s}
.nav-item .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500;transition:color 0.18s}
.nav-item.active{background:transparent}
.nav-item.active svg{stroke:var(--violet2)}
.nav-item.active .nav-label{color:var(--violet2);font-weight:600}

.insight-top-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px}
.insight-title{font-family:'DM Sans',sans-serif;font-size:28px;color:var(--white);font-weight:600}
.segmented{display:flex;background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:3px}
.insight-sub-tab{padding:5px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;background:transparent;color:var(--slate);cursor:pointer;transition:all 0.18s;border-radius:6px;text-align:center;white-space:nowrap}
.insight-sub-tab.active{background:var(--violet);color:#fff}

.insight-period-nav{display:flex;align-items:center;justify-content:space-between;padding:0 12px 14px}
.insight-period-label{font-size:13px;font-weight:500;color:var(--slate2)}
.nav-arrow-btn{background:var(--card);border:0.5px solid var(--border);padding:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs)}
.nav-arrow-btn svg{width:18px;height:18px;stroke:var(--slate2);stroke-width:2;fill:none}
.nav-arrow-btn:disabled{opacity:0.3;cursor:default}

.chart-card{margin:0 16px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.chart-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet2);font-weight:600;margin-bottom:14px}
.diff-chart{display:grid;grid-template-columns:repeat(var(--diff-cols,7),1fr);gap:4px;position:relative;padding:8px 0 0}
.diff-zero-line{position:absolute;left:0;right:0;top:calc(8px + 52px + 24px);height:1px;background:var(--border2);pointer-events:none}
.diff-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.diff-bar-wrap{display:flex;flex-direction:column;align-items:center;height:128px;justify-content:center}
.diff-bar-pos{display:flex;flex-direction:column;justify-content:flex-end;height:52px;width:100%}
.diff-bar-neg{display:flex;flex-direction:column;justify-content:flex-start;height:52px;width:100%}
.diff-bar{width:70%;margin:0 auto;min-height:3px}
.diff-bar:not(.neg){border-radius:3px 3px 0 0}
.diff-bar.neg{border-radius:0 0 3px 3px}
.diff-val{font-size:11px;font-weight:600;line-height:1;height:24px;display:flex;align-items:center;color:var(--slate)}
.bar-day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em}
.bar-day-today{color:var(--slate2);font-weight:600}
.chart-stats{display:flex;align-items:center;margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)}
.chart-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-stat-val{font-size:15px;font-weight:600;color:var(--white)}
.chart-stat-val.positive{color:#6ee7b7}
.chart-stat-val.negative{color:#f87171}
.chart-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500}
.chart-stat-divider{width:0.5px;height:28px;background:var(--border);flex-shrink:0}

.corr-card-title{font-size:11px;font-weight:600;color:var(--slate2);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.09em}
.corr-list{display:flex;flex-direction:column;gap:14px}
.corr-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.corr-name{font-size:14px;color:var(--text);font-weight:500}
.corr-score{font-size:13px;font-weight:600}
.corr-score.positive{color:#6ee7b7}
.corr-score.negative{color:#f87171}
.corr-bar-bg{height:5px;background:var(--navy3);border-radius:3px;overflow:hidden;margin-bottom:4px}
.corr-bar-fill{height:100%;border-radius:3px}
.corr-bar-fill.positive{background:var(--green)}
.corr-bar-fill.negative{background:#f87171}
.corr-meta{font-size:11px;color:var(--muted)}
.corr-note{font-size:11px;color:var(--muted);padding:4px 20px 16px;line-height:1.5;font-style:italic}

.day-detail-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 10px}
.day-detail-date{font-size:14px;font-weight:500;color:var(--white)}
.day-detail-close{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}
.day-detail-close svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none}

.settings-section{padding:0 16px 10px}
.settings-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;color:var(--slate2);font-size:14px;font-family:'DM Sans',sans-serif}
.settings-btn svg{width:18px;height:18px;stroke:var(--violet2);stroke-width:1.8;fill:none;flex-shrink:0}
.settings-label{font-size:12px;color:var(--muted);padding:12px 16px 6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:500}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;color:var(--white);z-index:200;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-state{text-align:center;padding:48px 32px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:var(--muted);stroke-width:1.2;fill:none;margin-bottom:16px;opacity:0.5}
.empty-state p{font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div class="app">
<div class="toast" id="toast"></div>

<div class="screen" id="screen-main">
  <div class="header">
    <div class="header-inner">
      <div class="logo">Lumina<span>.</span></div>
      <button class="header-btn" onclick="showExportImport()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <div id="view-daily">
    <div class="week-nav-row">
      <span class="week-nav-date" id="week-label"></span>
      <div class="week-nav-arrows">
        <button class="week-nav-arrow" onclick="shiftWeek(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button class="week-nav-arrow" id="week-next-btn" onclick="shiftWeek(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div class="week-strip"><div class="week-row" id="week-row"></div></div>
    <div id="daily-content"></div>
  </div>

  <div id="view-insights" style="display:none">
    <div class="insight-top-row">
      <div class="insight-title">Insights</div>
      <div class="segmented">
        <div class="insight-sub-tab active" id="itab-week" onclick="setInsightRange('week')">Week</div>
        <div class="insight-sub-tab" id="itab-month" onclick="setInsightRange('month')">Month</div>
      </div>
    </div>
    <div class="insight-period-nav">
      <button class="nav-arrow-btn" onclick="shiftInsight(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <span class="insight-period-label" id="insight-period-label"></span>
      <button class="nav-arrow-btn" id="insight-next-btn" onclick="shiftInsight(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div id="insights-content"></div>
  </div>
</div>

<div class="nav-bar-wrap">
  <div class="nav-bar">
    <div class="nav-item active" id="nav-daily" onclick="switchView('daily')">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="nav-label">Today</span>
    </div>
    <div class="nav-item" id="nav-insights" onclick="switchView('insights')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-label">Insights</span>
    </div>
  </div>
</div>
</div>

<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150" onclick="hideModal()"></div>
<div id="modal-sheet" style="display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy2);border-top:0.5px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 0 40px;z-index:151">
  <div style="width:36px;height:4px;background:var(--muted);border-radius:2px;margin:0 auto 20px"></div>
  <div style="padding:0 20px 16px;font-family:'DM Serif Display',serif;font-size:20px;color:var(--white)">Data & Settings</div>
  <div class="settings-section">
    <div class="settings-label">Export / Import</div>
    <button class="settings-btn" onclick="exportCSV()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export all entries as CSV</button>
    <button class="settings-btn" onclick="document.getElementById('import-input').click()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import from CSV</button>
    <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(this)">
  </div>
  <div class="settings-section">
    <div class="settings-label">Danger zone</div>
    <button class="settings-btn" id="clear-btn" onclick="clearAllData()" style="color:#fca5a5"><svg viewBox="0 0 24 24" style="stroke:#fca5a5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Clear all data</button>
  </div>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────
function localStr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day}
function todayStr(){return localStr(new Date())}
function parseDate(s){const p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return localStr(d)}
function fmtDay(s){return['Su','Mo','Tu','We','Th','Fr','Sa'][parseDate(s).getDay()]}
function fmtDayNum(s){return parseInt(s.slice(8,10),10)}
function getMondayOfWeek(s,offset){const d=parseDate(s);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow)+(offset*7));return localStr(d)}
function avg(arr){return arr.reduce(function(a,b){return a+b},0)/arr.length}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── STORAGE ──────────────────────────────────────────────
var STORAGE_KEY='lumina_v3';
var entries={};
var savedDates=[];

function load(){
  try{
    var r=localStorage.getItem(STORAGE_KEY);
    if(r){var d=JSON.parse(r);entries=d.entries||{};savedDates=d.saved||[];}
  }catch(e){entries={};savedDates=[];}
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({entries:entries,saved:savedDates}))}
function isSavedDate(d){return savedDates.indexOf(d)>=0}
function getEntry(d){if(!entries[d])entries[d]={morningEnergy:0,intention:'',eveningEnergy:0,givers:[],drainers:[],reflection:''};return entries[d]}
function hasData(d){var e=entries[d];return!!e&&(e.morningEnergy>0||e.eveningEnergy>0||(e.givers||[]).length>0||(e.drainers||[]).length>0)}

// ── STATE ─────────────────────────────────────────────────
var selectedDate=todayStr();
var weekOffset=0;
var editingDate=null;
var insightRange='week';
var insightOffset=0;
var insightSelectedDate=null;

// ── TOAST ─────────────────────────────────────────────────

// ── WEEK STRIP ────────────────────────────────────────────
function buildWeekStrip(){
  var row=document.getElementById('week-row');
  var today=todayStr();
  var mon=getMondayOfWeek(today,weekOffset);
  var sun=addDays(mon,6);
  var monD=parseDate(mon),sunD=parseDate(sun);
  function fmtM(d){return d.toLocaleDateString('en-US',{month:'short'})}
  var label=monD.getMonth()===sunD.getMonth()
    ?(fmtM(monD)+' '+monD.getDate()+'–'+sunD.getDate())
    :(fmtM(monD)+' '+monD.getDate()+' – '+fmtM(sunD)+' '+sunD.getDate());
  document.getElementById('week-label').textContent=label;
  var nextBtn=document.getElementById('week-next-btn');
  if(nextBtn)nextBtn.disabled=weekOffset>=0;
  row.innerHTML='';
  for(var i=0;i<7;i++){
    var d=addDays(mon,i);
    var isFuture=d>today;
    var cls='day-btn';
    if(d===today)cls+=' today';
    if(d===selectedDate)cls+=' selected';
    if(hasData(d))cls+=' has-data';
    if(isFuture)cls+=' future';
    var btn=document.createElement('div');
    btn.className=cls;
    btn.innerHTML='<span class="day-label">'+fmtDay(d)+'</span><span class="day-num">'+fmtDayNum(d)+'</span><span class="day-dot"></span>';
    if(!isFuture)(function(date){btn.onclick=function(){selectedDate=date;editingDate=null;buildWeekStrip();buildDailyContent()}})(d);
    row.appendChild(btn);
  }
}

function shiftWeek(dir){
  var next=weekOffset+dir;
  if(next>0)return;
  weekOffset=next;
  var mon=getMondayOfWeek(todayStr(),weekOffset);
  var sun=addDays(mon,6);
  var today=todayStr();
  if(selectedDate<mon||selectedDate>sun)selectedDate=(today>=mon&&today<=sun)?today:sun;
  animateWeekRow(dir>0?1:-1,buildWeekStrip);
  buildDailyContent();
}

function animateWeekRow(dir,cb){
  var row=document.getElementById('week-row');
  var W=document.querySelector('.week-strip').offsetWidth||300;
  var outX=dir>0?-W:W;
  var inX=dir>0?W:-W;
  row.style.transition='transform 0.18s ease,opacity 0.18s ease';
  row.style.transform='translateX('+outX+'px)';
  row.style.opacity='0';
  setTimeout(function(){
    cb();
    var r=document.getElementById('week-row');
    r.style.transition='none';
    r.style.transform='translateX('+inX+'px)';
    r.style.opacity='0';
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      r.style.transition='transform 0.22s ease,opacity 0.22s ease';
      r.style.transform='translateX(0)';
      r.style.opacity='1';
    })});
  },180);
}

// Swipe week strip
(function(){
  var strip=document.querySelector('.week-strip');
  var sx=0,sy=0,cx=0,locked=false,axisLocked=false;
  strip.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;cx=0;locked=false;axisLocked=false;document.getElementById('week-row').style.transition='none';},{passive:true});
  strip.addEventListener('touchmove',function(e){
    if(locked)return;
    var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!axisLocked){if(Math.abs(dy)>Math.abs(dx)){locked=true;return;}if(Math.abs(dx)>6)axisLocked=true;}
    if(!axisLocked)return;
    cx=dx;
    if(cx<0&&weekOffset>=0)cx=0;
    var r=document.getElementById('week-row');
    r.style.transform='translateX('+cx+'px)';
    r.style.opacity=String(1-Math.min(Math.abs(cx)/160,0.5));
  },{passive:true});
  strip.addEventListener('touchend',function(e){
    if(locked){locked=false;return;}
    var W=strip.offsetWidth||300;
    if(Math.abs(cx)>W*0.25){
      var back=cx>0;
      if(!back&&weekOffset>=0){snap();return;}
      shiftWeek(back?-1:1);
    } else {snap();}
    cx=0;axisLocked=false;
    function snap(){var r=document.getElementById('week-row');r.style.transition='transform 0.2s ease,opacity 0.2s ease';r.style.transform='translateX(0)';r.style.opacity='1';}
  },{passive:true});
})();

var eveningIcon='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--violet2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

function cardHeader(icon,sub,title){
  return'<div class="card-header"><div class="card-header-icon">'+icon+'</div><div class="card-header-text"><div class="card-header-sub">'+sub+'</div><div class="card-header-title">'+title+'</div></div></div>';
}

function energyRowHtml(val,fn){
  var h='<div class="energy-row">';
  for(var n=1;n<=5;n++){
    var cls='energy-btn e'+n+(n<=val?' filled':'')+(n===val?' selected':'');
    h+='<button class="'+cls+'" onclick="'+fn+'('+n+')">'+n+'</button>';
  }
  return h+'</div>';
}

function buildDailyContent(){
  var container=document.getElementById('daily-content');
  var today=todayStr();
  var isFuture=selectedDate>today;
  var isToday=selectedDate===today;
  var entry=getEntry(selectedDate);
  if(isFuture){container.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>No entry for this date yet.</p></div>';return;}
  var saved=isSavedDate(selectedDate);
  var isEditing=editingDate===selectedDate||(isToday&&!saved);
  var hasAny=hasData(selectedDate);
  if(saved&&!isEditing){buildReadOnly(container,entry);return;}
  if(!isToday&&hasAny&&editingDate!==selectedDate){buildReadOnly(container,entry);return;}
  buildEdit(container,entry,isToday);
}

function buildEdit(container,entry,isToday){
  var h='';
  h+='<div class="card">'+cardHeader(morningIcon,'Morning','Start of day check-in');
  h+='<div class="field-block"><div class="field-label">Energy level</div>'+energyRowHtml(entry.morningEnergy,'setMorning')+'</div>';
  h+='</div>';
  h+='<div class="card" style="margin-top:24px">'+cardHeader(eveningIcon,'Evening','End of day reflection');
  h+='<div class="field-block"><div class="field-label">Energy level</div>'+energyRowHtml(entry.eveningEnergy,'setEvening')+'</div>';
  h+='<div class="field-block"><div class="field-label" style="color:#6ee7b7">Energy givers</div>';
  if(entry.givers.length){h+='<div class="tag-list">'+entry.givers.map(function(t){return'<div class="tag positive">'+escHtml(t)+'<span class="tag-remove" onclick="removeTag(\'givers\',\''+escHtml(t)+'\',event)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></div>'}).join('')+'</div>';}
  h+='<input class="input-field" id="givers-input" placeholder="Add, press Enter…" onkeydown="handleTagKey(event,\'givers\')"></div>';
  h+='<div class="field-block"><div class="field-label" style="color:#fca5a5">Energy drainers</div>';
  if(entry.drainers.length){h+='<div class="tag-list">'+entry.drainers.map(function(t){return'<div class="tag negative">'+escHtml(t)+'<span class="tag-remove" onclick="removeTag(\'drainers\',\''+escHtml(t)+'\',event)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></div>'}).join('')+'</div>';}
  h+='<input class="input-field" id="drainers-input" placeholder="Add, press Enter…" onkeydown="handleTagKey(event,\'drainers\')"></div>';
  h+='</div>';
  h+='<button class="save-btn" id="save-btn" onclick="saveEntry()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save check-in</button>';
  h+='<div style="height:8px"></div>';
  container.innerHTML=h;
}

function buildReadOnly(container,entry){
  var diff=(entry.morningEnergy>0&&entry.eveningEnergy>0)?entry.eveningEnergy-entry.morningEnergy:null;
  var diffLabel=diff!==null?(diff>0?'↑ +'+diff:diff<0?'↓ '+diff:'→ 0'):null;
  var diffColor=diff>0?'#34d399':diff<0?'#f87171':'var(--slate)';

  var dateD=parseDate(selectedDate);
  var dateLabel=dateD.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'});

  // Horizontal dumbbell chart
  function dumbbellSVG(m,ev){
    var svgW=280,svgH=44,padL=16,padR=16,dotR=6;
    var trackW=svgW-padL-padR;
    function xFor(v){return padL+(v-1)/4*trackW;}
    var mx=xFor(m),ex=xFor(ev);
    var diff2=ev-m;
    var stemColor=diff2>0?'#34d399':diff2<0?'#f87171':'var(--slate)';
    var cy=svgH/2;
    var parts='';
    // Track
    parts+='<line x1="'+padL+'" y1="'+cy+'" x2="'+(padL+trackW)+'" y2="'+cy+'" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>';
    // Tick marks
    for(var v=1;v<=5;v++){
      var tx=xFor(v);
      parts+='<line x1="'+tx+'" y1="'+(cy-3)+'" x2="'+tx+'" y2="'+(cy+3)+'" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>';
      parts+='<text x="'+tx+'" y="'+(svgH-2)+'" text-anchor="middle" font-size="8" fill="var(--muted)">'+v+'</text>';
    }
    // Stem between dots
    if(m>0&&ev>0){
      parts+='<line x1="'+mx+'" y1="'+cy+'" x2="'+ex+'" y2="'+cy+'" stroke="'+stemColor+'" stroke-width="2.5" stroke-linecap="round"/>';
    }
    // Morning dot — solid filled
    if(m>0){
      parts+='<circle cx="'+mx+'" cy="'+cy+'" r="'+dotR+'" fill="var(--violet)" stroke="var(--card)" stroke-width="1.5"/>';
    }
    // Evening dot — outlined
    if(ev>0){
      parts+='<circle cx="'+ex+'" cy="'+cy+'" r="'+(dotR-1)+'" fill="var(--card)" stroke="var(--violet2)" stroke-width="2"/>';
    }
    return'<svg viewBox="0 0 '+svgW+' '+svgH+'" width="100%" style="display:block;overflow:visible">'+parts+'</svg>';
  }

  var h='<div class="card">';
  // Header row: date + delta badge
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  h+='<div style="font-size:18px;font-weight:600;color:var(--white)">'+dateLabel+'</div>';
  if(diffLabel)h+='<div style="background:var(--navy3);border:0.5px solid var(--border2);border-radius:var(--radius-xs);padding:6px 12px;font-size:13px;font-weight:600;color:'+diffColor+'">'+diffLabel+'</div>';
  h+='</div>';

  // Dumbbell chart
  if(entry.morningEnergy>0||entry.eveningEnergy>0){
    h+='<div style="margin-bottom:4px">';
    h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em">';
    h+='<div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--violet)"></div>Morning</div>';
    h+='<div style="display:flex;align-items:center;gap:5px">Evening<div style="width:7px;height:7px;border-radius:50%;background:var(--card);border:1.5px solid var(--violet2)"></div></div>';
    h+='</div>';
    h+=dumbbellSVG(entry.morningEnergy,entry.eveningEnergy);
    h+='</div><div style="height:12px"></div>';
  } else {
    h+='<div class="ro-empty">No energy logged</div>';
  }

  // Drainers
  if(entry.drainers.length){
    h+='<div style="margin-top:20px;margin-bottom:14px">';
    h+='<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);font-weight:600;margin-bottom:8px">Drainers</div>';
    h+='<div class="tag-list" style="margin-bottom:0">'+entry.drainers.map(function(t){return'<div class="tag negative">'+escHtml(t)+'</div>'}).join('')+'</div>';
    h+='</div>';
  }

  // Givers
  if(entry.givers.length){
    h+='<div style="margin-top:20px;margin-bottom:14px">';
    h+='<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--slate);font-weight:600;margin-bottom:8px">Givers</div>';
    h+='<div class="tag-list" style="margin-bottom:0">'+entry.givers.map(function(t){return'<div class="tag positive">'+escHtml(t)+'</div>'}).join('')+'</div>';
    h+='</div>';
  }

  if(!entry.morningEnergy&&!entry.eveningEnergy&&!entry.givers.length&&!entry.drainers.length)h+='<div class="ro-empty">Nothing logged</div>';

  h+='</div>';
  h+='<button class="save-btn" style="background:var(--card);border:0.5px solid var(--border2);color:var(--slate2);" onclick="startEditing()"> Edit</button>';
  h+='<div style="height:8px"></div>';
  container.innerHTML=h;
}

function saveEntry(){
  savedDates.push(selectedDate);save();editingDate=null;
  var btn=document.getElementById('save-btn');
  if(btn){btn.classList.add('saved');btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Saved';setTimeout(function(){buildDailyContent();buildWeekStrip();},1200);}
  else{buildDailyContent();buildWeekStrip();}
}
function startEditing(){editingDate=selectedDate;buildDailyContent();}
function setMorning(n){var e=getEntry(selectedDate);e.morningEnergy=e.morningEnergy===n?0:n;save();buildDailyContent();buildWeekStrip();}
function setEvening(n){var e=getEntry(selectedDate);e.eveningEnergy=e.eveningEnergy===n?0:n;save();buildDailyContent();buildWeekStrip();}
function setField(f,v){var e=getEntry(selectedDate);e[f]=v;save();}
function handleTagKey(ev,field){
  if(ev.key==='Enter'||ev.key===','){
    ev.preventDefault();
    var val=ev.target.value.trim().replace(/,$/,'').trim();
    if(!val)return;
    var e=getEntry(selectedDate);
    if(e[field].indexOf(val)<0){e[field].push(val);save();buildDailyContent();}
    var inputId=field==='givers'?'givers-input':'drainers-input';
    setTimeout(function(){var el=document.getElementById(inputId);if(el)el.focus();},0);
  }
}
function removeTag(field,val,ev){
  ev.stopPropagation();
  var e=getEntry(selectedDate);
  e[field]=e[field].filter(function(t){return t!==val});
  save();buildDailyContent();
  var inputId=field==='givers'?'givers-input':'drainers-input';
  setTimeout(function(){var el=document.getElementById(inputId);if(el)el.focus();},0);
}

// ── INSIGHTS ──────────────────────────────────────────────
function setInsightRange(r){insightRange=r;insightOffset=0;insightSelectedDate=null;document.getElementById('itab-week').classList.toggle('active',r==='week');document.getElementById('itab-month').classList.toggle('active',r==='month');buildInsights();}
function shiftInsight(dir){insightOffset+=dir;if(insightOffset>0)insightOffset=0;insightSelectedDate=null;buildInsights();}
function selectInsightDate(d){insightSelectedDate=d===insightSelectedDate?null:d;buildInsights();}

function getInsightRange(){
  var today=todayStr();
  if(insightRange==='week'){
    var mon=getMondayOfWeek(today,insightOffset);
    var range=[];for(var i=0;i<7;i++)range.push(addDays(mon,i));
    return{range:range,start:mon,end:addDays(mon,6)};
  } else {
    var d=new Date();d.setDate(1);d.setMonth(d.getMonth()+insightOffset);
    var y=d.getFullYear(),m=d.getMonth();
    var days=new Date(y,m+1,0).getDate();
    var range=[];
    for(var i=1;i<=days;i++)range.push(y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0'));
    return{range:range,start:range[0],end:range[range.length-1]};
  }
}

function buildInsights(){
  var ri=getInsightRange();
  var range=ri.range,start=ri.start,end=ri.end;
  var today=todayStr();
  var s=parseDate(start),e=parseDate(end);
  function fmtM(d){return d.toLocaleDateString('en-US',{month:'short'})}
  var label=insightRange==='week'
    ?(s.getMonth()===e.getMonth()?fmtM(s)+' '+s.getDate()+'–'+e.getDate()+', '+s.getFullYear():fmtM(s)+' '+s.getDate()+' – '+fmtM(e)+' '+e.getDate()+', '+e.getFullYear())
    :s.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('insight-period-label').textContent=label;
  var nextBtn=document.getElementById('insight-next-btn');
  if(nextBtn)nextBtn.disabled=insightOffset>=0;

  var c=document.getElementById('insights-content');
  var inRange=range.map(function(d){var o={date:d};var ex=entries[d]||{};for(var k in ex)o[k]=ex[k];return o;});
  var withMorning=inRange.filter(function(e){return e.morningEnergy>0});
  var withEvening=inRange.filter(function(e){return e.eveningEnergy>0});
  var withBoth=inRange.filter(function(e){return e.morningEnergy>0&&e.eveningEnergy>0});

  if(!withMorning.length&&!withEvening.length){
    c.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><p>No entries yet in this period.</p></div>';
    return;
  }

  var avgMorning=withMorning.length?avg(withMorning.map(function(e){return e.morningEnergy})):null;
  var avgEvening=withEvening.length?avg(withEvening.map(function(e){return e.eveningEnergy})):null;
  var avgDiff=withBoth.length?avg(withBoth.map(function(e){return e.eveningEnergy-e.morningEnergy})):null;

  // ── SMOOTH AREA CHART ──
  var svgW=360,svgH=190,padL=16,padR=8,padT=16,padB=30;
  var plotW=svgW-padL-padR,plotH=svgH-padT-padB;
  var n=range.length;
  var stepX=plotW/(n>1?n-1:1);
  function yFor(val){return padT+plotH-(val-1)/4*plotH;}
  var dotR=insightRange==='week'?6:4;
  var stemW=insightRange==='week'?dotR*2:dotR*2;
  var svgParts='<defs>';

  // Collect morning and evening point arrays (x, y, hasData)
  var mPts=[],ePts=[];
  range.forEach(function(d,i){
    var ex=entries[d]||{};
    var cx=padL+i*stepX;
    mPts.push({x:cx,y:ex.morningEnergy>0?yFor(ex.morningEnergy):null,v:ex.morningEnergy||0});
    ePts.push({x:cx,y:ex.eveningEnergy>0?yFor(ex.eveningEnergy):null,v:ex.eveningEnergy||0});
  });

  // Monotone cubic spline — never overshoots, no weird curves
  function smoothPath(pts){
    if(!pts||pts.length<2)return null;
    var n=pts.length;
    // Compute slopes
    var dx=[],dy=[],slope=[];
    for(var i=0;i<n-1;i++){
      dx[i]=pts[i+1].x-pts[i].x;
      dy[i]=pts[i+1].y-pts[i].y;
      slope[i]=dy[i]/dx[i];
    }
    // Tangents
    var m=[];
    m[0]=slope[0];
    for(var i=1;i<n-1;i++){
      if(slope[i-1]*slope[i]<=0){m[i]=0;}
      else{m[i]=(slope[i-1]+slope[i])/2;}
    }
    m[n-1]=slope[n-2];
    // Monotonicity constraint
    for(var i=0;i<n-1;i++){
      if(slope[i]===0){m[i]=0;m[i+1]=0;}
      else{
        var a=m[i]/slope[i],b=m[i+1]/slope[i];
        var h=Math.sqrt(a*a+b*b);
        if(h>3){m[i]=3*slope[i]/h*a;m[i+1]=3*slope[i]/h*b;}
      }
    }
    // Build path
    var d='M'+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2);
    for(var i=0;i<n-1;i++){
      var x0=pts[i].x,y0=pts[i].y,x1=pts[i+1].x,y1=pts[i+1].y;
      var h=dx[i];
      d+=' C'+(x0+h/3).toFixed(2)+' '+(y0+m[i]*h/3).toFixed(2)+' '+
            (x1-h/3).toFixed(2)+' '+(y1-m[i+1]*h/3).toFixed(2)+' '+
            x1.toFixed(2)+' '+y1.toFixed(2);
    }
    return d;
  }

  function catmullPath(pts){
    var valid=pts.filter(function(p){return p.y!==null});
    return smoothPath(valid);
  }

  var mPath=catmullPath(mPts);
  var ePath=catmullPath(ePts);

  // Build filled area between curves with green/red split
  // We approximate by drawing the whole area and clipping with two rects
  var eValid=ePts.filter(function(p){return p.y!==null});
  var mValid=mPts.filter(function(p){return p.y!==null});

  svgParts+='</defs>';

  // Grid lines
  [1,2,3,4,5].forEach(function(v){
    var y=yFor(v);
    svgParts+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+plotW)+'" y2="'+y+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    svgParts+='<text x="2" y="'+(y-3)+'" text-anchor="start" font-size="9" fill="var(--muted)">'+v+'</text>';
  });

  // Stems and dots per day
  range.forEach(function(d,i){
    var ex=entries[d]||{};
    var m=ex.morningEnergy||0;
    var ev=ex.eveningEnergy||0;
    var cx=padL+i*stepX;
    var isToday=d===today;
    var isSel=d===insightSelectedDate;
    var showLbl=insightRange==='week'||(i%Math.ceil(n/7)===0);

    if(showLbl){
      var lbl=insightRange==='week'?fmtDay(d).charAt(0):String(fmtDayNum(d));
      svgParts+='<text x="'+cx+'" y="'+(svgH-6)+'" text-anchor="middle" font-size="9" fill="'+(isToday?'var(--white)':'var(--muted)')+'" font-weight="'+(isSel||isToday?'700':'400')+'">'+lbl+'</text>';
    }

    svgParts+='<rect x="'+(cx-10)+'" y="'+padT+'" width="20" height="'+plotH+'" fill="transparent" style="cursor:pointer" onclick="selectInsightDate(\''+d+'\')"/>';

    if(m>0&&ev>0){
      var my=yFor(m),evy=yFor(ev);
      var diff=ev-m;
      var stemColor=diff>0?'#34d399':diff<0?'#f87171':'var(--slate)';
      // Dashed vertical stem
      svgParts+='<line x1="'+cx+'" y1="'+my+'" x2="'+cx+'" y2="'+evy+'" stroke="'+stemColor+'" stroke-width="'+stemW+'" stroke-linecap="round" opacity="0.8"/>';
      // Morning dot — solid
      svgParts+='<circle cx="'+cx+'" cy="'+my+'" r="'+(isSel?dotR+1.5:dotR)+'" fill="var(--violet)" stroke="var(--card)" stroke-width="1.5"/>';
      // Evening dot — outlined, radius compensated for stroke so outer edge matches morning
      svgParts+='<circle cx="'+cx+'" cy="'+evy+'" r="'+(isSel?dotR+0.5:dotR-1)+'" fill="var(--card)" stroke="var(--violet2)" stroke-width="2"/>';
    } else if(m>0){
      svgParts+='<circle cx="'+cx+'" cy="'+yFor(m)+'" r="'+dotR+'" fill="var(--violet)" stroke="var(--card)" stroke-width="1.5" opacity="0.5"/>';
    } else if(ev>0){
      svgParts+='<circle cx="'+cx+'" cy="'+yFor(ev)+'" r="'+dotR+'" fill="var(--card)" stroke="var(--violet2)" stroke-width="2" opacity="0.5"/>';
    }
  });

  var html='<div class="chart-card">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  html+='<div class="chart-title" style="margin-bottom:0">Energy per day</div>';
  html+='<div style="display:flex;gap:12px">';
  html+='<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--slate)"><div style="width:8px;height:8px;border-radius:50%;background:var(--violet)"></div>Morning</div>';
  html+='<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--slate)"><div style="width:8px;height:8px;border-radius:50%;background:var(--navy);border:1.5px solid var(--violet2)"></div>Evening</div>';
  html+='</div></div>';
  html+='<svg viewBox="0 0 '+svgW+' '+svgH+'" width="100%" style="overflow:visible;display:block">'+svgParts+'</svg>';
  html+='<div class="chart-stats" style="margin-top:12px">';
  html+='<div class="chart-stat"><span class="chart-stat-val">'+(avgMorning!==null?avgMorning.toFixed(1):'—')+'</span><span class="chart-stat-label">Avg morning</span></div>';
  html+='<div class="chart-stat-divider"></div>';
  html+='<div class="chart-stat"><span class="chart-stat-val">'+(avgEvening!==null?avgEvening.toFixed(1):'—')+'</span><span class="chart-stat-label">Avg evening</span></div>';
  html+='<div class="chart-stat-divider"></div>';
  html+='<div class="chart-stat"><span class="chart-stat-val'+(avgDiff!==null?(avgDiff>=0?' positive':' negative'):'')+'">'+(avgDiff!==null?(avgDiff>=0?'+':'')+avgDiff.toFixed(1):'—')+'</span><span class="chart-stat-label">Avg shift</span></div>';
  html+='</div></div>';

  if(insightSelectedDate){
    var se=entries[insightSelectedDate]||{};
    var sd=parseDate(insightSelectedDate);
    var sdLabel=sd.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    html+='<div class="day-detail-header"><span class="day-detail-date">'+sdLabel+'</span><button class="day-detail-close" onclick="selectInsightDate(null)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    var sg=se.givers||[],sd2=se.drainers||[];
    if(sg.length)html+='<div class="card" style="padding:16px 20px"><div class="corr-card-title">Energy givers</div><div class="tag-list">'+sg.map(function(t){return'<div class="tag positive">'+escHtml(t)+'</div>'}).join('')+'</div></div>';
    if(sd2.length)html+='<div class="card" style="padding:16px 20px"><div class="corr-card-title">Energy drainers</div><div class="tag-list">'+sd2.map(function(t){return'<div class="tag negative">'+escHtml(t)+'</div>'}).join('')+'</div></div>';
    if(!sg.length&&!sd2.length)html+='<div class="card" style="padding:16px 20px"><div class="ro-empty">No givers or drainers logged.</div></div>';
  } else {
    var allWithBoth=Object.keys(entries).map(function(d){var o={date:d};var ex=entries[d];for(var k in ex)o[k]=ex[k];return o;}).filter(function(e){return e.morningEnergy>0&&e.eveningEnergy>0});
    var allGivers={},allDrainers={};
    allWithBoth.forEach(function(e){(e.givers||[]).forEach(function(g){allGivers[g]=true});(e.drainers||[]).forEach(function(d){allDrainers[d]=true})});

    function computeCorr(name,field){
      var w=allWithBoth.filter(function(e){return(e[field]||[]).indexOf(name)>=0});
      var wo=allWithBoth.filter(function(e){return(e[field]||[]).indexOf(name)<0});
      if(!w.length)return null;
      var aW=avg(w.map(function(e){return e.eveningEnergy-e.morningEnergy}));
      var aWo=wo.length?avg(wo.map(function(e){return e.eveningEnergy-e.morningEnergy})):0;
      return{name:name,impact:aW-aWo,n:w.length,avgWith:aW};
    }

    var boosters=Object.keys(allGivers).map(function(n){return computeCorr(n,'givers')}).filter(Boolean).sort(function(a,b){return b.impact-a.impact}).slice(0,6);
    var drains=Object.keys(allDrainers).map(function(n){return computeCorr(n,'drainers')}).filter(Boolean).sort(function(a,b){return a.impact-b.impact}).slice(0,6);

    if(boosters.length||drains.length){
      var allItems=boosters.concat(drains);
      var maxI=Math.max.apply(null,allItems.map(function(c){return Math.abs(c.impact)}).concat([0.1]));
      function renderRow(c,pos){
        var pct=Math.round((Math.abs(c.impact)/maxI)*100);
        return'<div class="corr-item"><div class="corr-top"><span class="corr-name">'+escHtml(c.name)+'</span><span class="corr-score '+(pos?'positive':'negative')+'">'+(c.impact>0?'+':'')+c.impact.toFixed(2)+'</span></div><div class="corr-bar-bg"><div class="corr-bar-fill '+(pos?'positive':'negative')+'" style="width:'+pct+'%"></div></div><div class="corr-meta">'+(c.n===1?'1 day':c.n+' days')+' · avg shift '+(c.avgWith>=0?'+':'')+c.avgWith.toFixed(1)+' when present</div></div>';
      }
      if(boosters.length)html+='<div class="card" style="padding:16px 20px"><div class="corr-card-title">Energy boosters</div><div class="corr-list">'+boosters.map(function(c){return renderRow(c,true)}).join('')+'</div></div>';
      if(drains.length)html+='<div class="card" style="padding:16px 20px"><div class="corr-card-title">Energy drains</div><div class="corr-list">'+drains.map(function(c){return renderRow(c,false)}).join('')+'</div></div>';
      html+='<div class="corr-note">Impact = avg energy shift on days with this activity minus days without. Tap a bar to see a specific day.</div>';
    }
  }

  html+='<div style="height:8px"></div>';
  c.innerHTML=html;
}

// ── EXPORT ───────────────────────────────────────────────
function exportCSV(){
  var rows=[['date','morning_energy','intention','evening_energy','givers','drainers','reflection']];
  Object.keys(entries).sort().forEach(function(d){
    var e=entries[d];
    rows.push([d,e.morningEnergy||'','"'+(e.intention||'').replace(/"/g,'""')+'"',e.eveningEnergy||'','"'+(e.givers||[]).join(',').replace(/"/g,'""')+'"','"'+(e.drainers||[]).join(',').replace(/"/g,'""')+'"','"'+(e.reflection||'').replace(/"/g,'""')+'"']);
  });
  var csv=rows.map(function(r){return r.join(',')}).join('\n');
  if(navigator.share){
    var file=new File([csv],'lumina-'+todayStr()+'.csv',{type:'text/csv'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Lumina Export'}).catch(function(){});hideModal();return;}
  }
  hideModal();
  var overlay=document.createElement('div');
  overlay.id='export-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;flex-direction:column;padding:24px 16px;gap:12px';
  overlay.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#f0f4ff;font-size:15px;font-weight:600">Copy your export</span><button onclick="document.getElementById(\'export-overlay\').remove()" style="background:none;border:none;color:#8b9ab4;font-size:24px;cursor:pointer;line-height:1">×</button></div><textarea id="export-csv" readonly style="flex:1;background:#101D36;color:#b0bdcf;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;font-size:11px;font-family:monospace;resize:none;outline:none"></textarea><button onclick="navigator.clipboard.writeText(document.getElementById(\'export-csv\').value).then(function(){var b=event.target;b.textContent=\'Copied!\';setTimeout(function(){document.getElementById(\'export-overlay\').remove()},1000)})" style="background:#6366f1;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif">Copy to clipboard</button>';
  document.body.appendChild(overlay);
  document.getElementById('export-csv').value=csv;
}

// ── IMPORT ───────────────────────────────────────────────
function importCSV(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n').filter(function(l){return l.trim()});
    if(lines.length<2){showToast('No data found');return;}
    var headers=parseCSVLine(lines[0]).map(function(h){return h.toLowerCase().trim()});
    function col(name){return headers.indexOf(name)}
    var count=0;
    lines.slice(1).forEach(function(line){
      var cols=parseCSVLine(line);
      if(cols.length<2)return;
      var dateIdx=col('date')>=0?col('date'):0;
      var date=(cols[dateIdx]||'').trim();
      if(!/^\d{4}-\d{2}-\d{2}$/.test(date))return;
      function get(name,fb){var i=col(name);return i>=0?(cols[i]||''):(cols[fb]||'')}
      entries[date]={
        morningEnergy:parseInt(get('start of day energy',1))||parseInt(get('morning_energy',1))||0,
        intention:get('intention',2),
        eveningEnergy:parseInt(get('end of day energy',3))||parseInt(get('evening_energy',3))||0,
        givers:get('energy givers',4).split(',').map(function(s){return s.trim()}).filter(Boolean),
        drainers:get('energy drainers',5).split(',').map(function(s){return s.trim()}).filter(Boolean),
        reflection:get('reflection',6)
      };
      count++;
    });
    save();buildWeekStrip();buildDailyContent();hideModal();showToast('Imported '+count+' entries');
  };
  reader.readAsText(file);input.value='';
}

function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'&&!inQ)inQ=true;
    else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}
